name: SIMBET — Daily refresh J/J+1

on:
  schedule:
    - cron: "1 22 * * *"
    - cron: "1 23 * * *"
    # One-time catch-up for 2026-05-17 — 12:05 Paris (= 10:05 UTC).
    # Fires daily but gated to the exact date below; no-op afterwards.
    - cron: "5 10 * * *"
    - cron: "25 10 * * *"
    - cron: "33 10 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Gate — only run at 00:01 Paris time (skip duplicate cron)
        id: gate
        run: |
          set -u
          PARIS_HM=$(TZ="Europe/Paris" date +%H:%M)
          PARIS_HOUR=$(TZ="Europe/Paris" date +%H)
          PARIS_DATE=$(TZ="Europe/Paris" date +%Y-%m-%d)
          EVENT="${{ github.event_name }}"
          echo "Event: $EVENT — Paris: $PARIS_DATE $PARIS_HM"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT" = "push" ]; then
            if [ "$PARIS_DATE" = "2026-05-17" ]; then
              echo "Push on catch-up day — proceeding."
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "Push outside catch-up day — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # schedule
          if [ "$PARIS_HOUR" = "00" ]; then
            echo "Paris hour is 00 — proceeding (daily slot)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$PARIS_DATE" = "2026-05-17" ] && [ "$PARIS_HOUR" = "12" ]; then
            echo "Paris date=$PARIS_DATE hour=12 — one-time catch-up, proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Paris date=$PARIS_DATE hour=$PARIS_HOUR — skipping (no matching slot)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check — confirm target backend
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -u
          BASE="${{ secrets.SIMBET_API_BASE }}"
          # Affiche un fingerprint non sensible de la base URL (longueur + hash court).
          # Les secrets sont automatiquement masqués par GitHub si on les echo directement.
          BASE_LEN=${#BASE}
          BASE_HASH=$(printf '%s' "$BASE" | shasum -a 256 | cut -c1-12)
          echo "SIMBET_API_BASE length=$BASE_LEN sha256_12=$BASE_HASH"

          echo "==== GET /api/health ===="
          HTTP_CODE=$(curl -sS --max-time 30 \
            -o health.json \
            -w "%{http_code}" \
            "$BASE/api/health" || echo "000")

          echo "HTTP status: $HTTP_CODE"
          echo "----- body (first 1000 chars) -----"
          head -c 1000 health.json || true
          echo
          echo "----- end body -----"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::/api/health returned $HTTP_CODE — wrong base URL or backend down."
            exit 1
          fi

      - name: Refresh today
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -u
          echo "==== /api/matches/today?refresh=true ===="
          HTTP_CODE=$(curl -sS --max-time 1800 --retry 2 --retry-delay 30 \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -o today.json \
            -w "%{http_code}" \
            "${{ secrets.SIMBET_API_BASE }}/api/matches/today?refresh=true")

          echo "HTTP status: $HTTP_CODE"
          echo "----- raw body (first 1500 chars) -----"
          head -c 1500 today.json || true
          echo
          echo "----- end body -----"

          python3 - "$HTTP_CODE" <<'PY'
          import json, sys
          http_code = sys.argv[1]
          try:
              with open("today.json") as f:
                  body = f.read()
          except Exception as e:
              print(f"::error::Cannot read today.json: {e}")
              sys.exit(1)

          if http_code != "200":
              print(f"::error::HTTP status {http_code} (expected 200)")
              print("Body:", body[:500])
              sys.exit(1)

          try:
              d = json.loads(body)
          except Exception as e:
              print(f"::error::Invalid JSON: {e}")
              print("Body:", body[:500])
              sys.exit(1)

          if isinstance(d, dict) and "detail" in d:
              print(f"::error::API returned error detail: {d['detail']}")
              sys.exit(1)

          count = d.get("count")
          if count is None:
              print(f"::error::Missing 'count' in API response")
              print("Keys:", list(d.keys()))
              sys.exit(1)

          print(f"count={count}")
          print(f"bet_history_saved={d.get('bet_history_saved')}")
          print(f"historical_data_saved={d.get('historical_data_saved')}")
          print(f"quota={d.get('quota')}")
          print(f"source={d.get('source')}")
          PY

      - name: Refresh tomorrow
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -u
          echo "==== /api/matches/tomorrow?refresh=true&limit=50 ===="
          HTTP_CODE=$(curl -sS --max-time 1800 --retry 2 --retry-delay 30 \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -o tomorrow.json \
            -w "%{http_code}" \
            "${{ secrets.SIMBET_API_BASE }}/api/matches/tomorrow?refresh=true&limit=50")

          echo "HTTP status: $HTTP_CODE"
          echo "----- raw body (first 1500 chars) -----"
          head -c 1500 tomorrow.json || true
          echo
          echo "----- end body -----"

          python3 - "$HTTP_CODE" <<'PY'
          import json, sys
          http_code = sys.argv[1]
          try:
              with open("tomorrow.json") as f:
                  body = f.read()
          except Exception as e:
              print(f"::error::Cannot read tomorrow.json: {e}")
              sys.exit(1)

          if http_code != "200":
              print(f"::error::HTTP status {http_code} (expected 200)")
              print("Body:", body[:500])
              sys.exit(1)

          try:
              d = json.loads(body)
          except Exception as e:
              print(f"::error::Invalid JSON: {e}")
              print("Body:", body[:500])
              sys.exit(1)

          if isinstance(d, dict) and "detail" in d:
              print(f"::error::API returned error detail: {d['detail']}")
              sys.exit(1)

          count = d.get("count")
          if count is None:
              print(f"::error::Missing 'count' in API response")
              print("Keys:", list(d.keys()))
              sys.exit(1)

          print(f"count={count}")
          print(f"bet_history_saved={d.get('bet_history_saved')}")
          print(f"historical_data_saved={d.get('historical_data_saved')}")
          print(f"quota={d.get('quota')}")
          print(f"source={d.get('source')}")
          PY

      - name: Upload artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs-${{ github.run_id }}
          path: |
            today.json
            tomorrow.json
          retention-days: 7
